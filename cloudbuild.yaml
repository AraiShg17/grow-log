steps:
  - name: node:20
    entrypoint: npm
    args: ['ci']

  - name: node:20
    entrypoint: npm
    args: ['run', 'format:check']

  - name: node:20
    entrypoint: npm
    args: ['run', 'lint']

  - name: node:20
    entrypoint: npm
    args: ['run', 'type-check']

  - name: node:20
    entrypoint: npm
    args: ['test']

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=OPENAI_API_KEY=OPEN_AI_API_KEY:latest
      - --set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},OPENAI_MODEL=${_OPENAI_MODEL}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - add-iam-policy-binding
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --member=allUsers
      - --role=roles/run.invoker

substitutions:
  _REGION: asia-northeast1
  _ARTIFACT_REPO: cloud-run-source-deploy
  _IMAGE_NAME: grow-log
  _SERVICE_NAME: grow-log-web
  _FIRESTORE_DATABASE_ID: grow-log-db
  _GCS_BUCKET_NAME: home-items-app-grow-log-photos
  _OPENAI_MODEL: gpt-4o-mini

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
